<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chainspot - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Chainspot DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://chainspot-app.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #f6f5f2;
  --surface: #ffffff;
  --surface-soft: #f9faf8;
  --ink: #111715;
  --muted: #68716e;
  --faint: #9aa19e;
  --line: rgba(17, 23, 21, 0.09);
  --line-strong: rgba(17, 23, 21, 0.16);
  --accent: #16B0A6;
  --accent-soft: rgba(22, 176, 166, 0.12);
  --shadow: 0 28px 70px -36px rgba(17, 23, 21, 0.34);
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
}

html {
  overflow: hidden;
}

body {
  min-height: 100dvh;
  margin: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  background:
    radial-gradient(circle at 50% -18%, rgba(22, 176, 166, 0.16), transparent 36%),
    linear-gradient(180deg, #fbfaf7 0%, var(--bg) 56%, #f0f2ef 100%);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

h1,
p {
  margin: 0;
}

.topbar {
  flex: none;
  display: flex;
  align-items: center;
  gap: 18px;
  width: 100%;
  padding: 18px clamp(18px, 4vw, 42px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-size: 1.06rem;
  font-weight: 760;
  letter-spacing: 0;
}

.brand img {
  width: 28px;
  height: 28px;
  border-radius: 9px;
  box-shadow: 0 0 0 1px var(--line);
}

.nav {
  display: flex;
  align-items: center;
  gap: clamp(18px, 2.4vw, 30px);
  margin-left: 12px;
}

.nav a {
  color: var(--muted);
  font-size: 0.93rem;
  font-weight: 560;
  transition: color 160ms ease;
}

.nav a:hover {
  color: var(--ink);
}

.spacer {
  flex: 1;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 17px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.58);
  color: var(--ink);
  font-size: 0.91rem;
  font-weight: 680;
  box-shadow: 0 10px 24px -20px rgba(17, 23, 21, 0.45);
  transition: transform 140ms ease, border-color 160ms ease, background 160ms ease;
}

.ghost:hover {
  transform: translateY(-1px);
  border-color: rgba(22, 176, 166, 0.45);
  background: #fff;
}

.stage {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 10px clamp(18px, 4vw, 42px);
  text-align: center;
}

.hero {
  display: grid;
  justify-items: center;
}

h1 {
  max-width: 10ch;
  font-size: clamp(3.1rem, 7vw, 5.3rem);
  font-weight: 820;
  line-height: 0.98;
  letter-spacing: 0;
}

.sub {
  max-width: 58ch;
  margin-top: 18px;
  color: var(--muted);
  font-size: clamp(1.02rem, 1.65vw, 1.18rem);
}

.sub strong {
  color: var(--ink);
  font-weight: 760;
  box-shadow: inset 0 -0.42em 0 var(--accent-soft);
}

.card {
  width: min(592px, 100%);
  margin-top: 34px;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.9)),
    var(--surface);
  box-shadow: var(--shadow);
}

.route {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 44px minmax(0, 1fr);
  align-items: stretch;
  gap: 12px;
}

.leg {
  min-width: 0;
  padding: 15px 16px;
  border: 1px solid var(--line);
  border-radius: 15px;
  background: var(--surface-soft);
  text-align: left;
}

.label {
  display: block;
  color: var(--faint);
  font-size: 0.7rem;
  font-weight: 760;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.chip {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 32px;
  margin-top: 10px;
  color: var(--ink);
  font-size: 1.09rem;
  font-weight: 780;
}

.chip img {
  width: 28px;
  height: 28px;
  flex: none;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(17, 23, 21, 0.05);
}

.switch {
  align-self: center;
  justify-self: center;
  width: 44px;
  height: 44px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  background: #fff;
  color: var(--muted);
  cursor: pointer;
  box-shadow: 0 12px 28px -22px rgba(17, 23, 21, 0.55);
  transition: transform 160ms ease, color 160ms ease, border-color 160ms ease, background 160ms ease;
}

.switch span {
  font-size: 1.1rem;
  line-height: 1;
}

.switch:hover {
  transform: translateY(-1px);
  border-color: rgba(22, 176, 166, 0.45);
  background: var(--accent-soft);
  color: var(--accent);
}

.primary {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 56px;
  margin-top: 16px;
  border-radius: 15px;
  background: var(--accent);
  color: #fff;
  font-size: 1.06rem;
  font-weight: 800;
  box-shadow: 0 18px 34px -24px rgba(22, 176, 166, 0.85);
  transition: transform 140ms ease, background 160ms ease, box-shadow 160ms ease;
}

.primary:hover {
  transform: translateY(-1px);
  background: var(--accent);
  box-shadow: 0 20px 36px -22px rgba(22, 176, 166, 0.95);
}

.foot {
  flex: none;
  padding: 15px 24px 22px;
  color: var(--faint);
  text-align: center;
  font-size: 0.84rem;
  font-weight: 560;
}

@media (max-width: 640px) {
  .topbar {
    padding: 14px 16px;
    gap: 10px;
  }

  .nav {
    display: none;
  }

  .brand {
    font-size: 1rem;
  }

  .ghost {
    min-height: 38px;
    padding: 0 14px;
    font-size: 0.88rem;
  }

  .stage {
    justify-content: center;
    padding: 6px 18px 4px;
  }

  h1 {
    font-size: clamp(3rem, 15vw, 3.7rem);
  }

  .sub {
    margin-top: 14px;
    font-size: 1rem;
    line-height: 1.46;
  }

  .card {
    margin-top: 24px;
    padding: 15px;
    border-radius: 20px;
  }

  .route {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .leg {
    padding: 13px 14px;
  }

  .switch {
    width: 40px;
    height: 40px;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .primary {
    min-height: 52px;
    margin-top: 14px;
  }

  .foot {
    padding: 12px 18px 16px;
  }
}

@media (max-height: 720px) {
  .topbar {
    padding-top: 12px;
    padding-bottom: 10px;
  }

  .stage {
    padding-top: 4px;
    padding-bottom: 2px;
  }

  .sub {
    margin-top: 12px;
  }

  .card {
    margin-top: 22px;
    padding: 15px;
  }

  .leg {
    padding-top: 12px;
    padding-bottom: 12px;
  }

  .primary {
    min-height: 50px;
  }

  .foot {
    padding-top: 10px;
    padding-bottom: 12px;
  }
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Chainspot</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Chainspot</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Chainspot &mdash; 2026</footer>
</body>
</html>
